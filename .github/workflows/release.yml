name: 🚀 Publish to crates.io

on:
  push:
    tags:
      - v**

permissions:
  contents: read

jobs:
  test:
    uses: ./.github/workflows/test.yml

  publish:
    name: 🚀 Publish to crates.io
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: 🛠 Checkout
        uses: actions/checkout@v6

      - name: 🚀 Publish Crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish
